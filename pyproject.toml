[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "insurance-causal"
version = "0.1.0"
description = "Causal inference for insurance pricing: a Double Machine Learning interface built for actuaries."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
authors = [{ name = "Burning Cost", email = "pricing.frontier@gmail.com" }]
keywords = [
    "insurance", "causal-inference", "double-machine-learning", "dml",
    "pricing", "actuarial", "treatment-effect", "econometrics",
    "catboost", "polars",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Financial and Insurance Industry",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Office/Business :: Financial",
]
dependencies = [
    "numpy>=1.24",
    "pandas>=2.0",
    "polars>=0.20",
    "scikit-learn>=1.3",
    "scipy>=1.11",
    "doubleml>=0.7",
    "catboost>=1.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "catboost>=1.2",
]

[project.urls]
Repository = "https://github.com/burning-cost/insurance-causal"
Issues = "https://github.com/burning-cost/insurance-causal/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/insurance_causal"]

[tool.pytest.ini_options]
testpaths = ["tests"]
